<header class="site-header">
  <nav class="site-nav">
    <a class="nav-brand" href="{{ '/' | prepend: site.baseurl }}">{{ site.title }}</a>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="this.closest('.site-nav').classList.toggle('nav-open')">
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links">
      <li><a href="/writing"{% if page.url == '/writing/' %} class="active"{% endif %}>Posts</a></li>
      <li><a href="/about"{% if page.url == '/about/' %} class="active"{% endif %}>About</a></li>
      <li><a href="/contact"{% if page.url == '/contact/' %} class="active"{% endif %}>Contact</a></li>
    </ul>
  </nav>
</header>
